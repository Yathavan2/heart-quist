<!DOCTYPE html>
<html>
<head>
  <title>Sign Up | Heart Quest</title>
  <link rel="stylesheet" href="auth-styles.css">
</head>
<body>

<div class="heart-floating" style="left:15%;">💕</div>
<div class="heart-floating" style="left:75%; animation-duration:7s;">💖</div>

<div class="form-container">
  <h1>Create Account 💗</h1>
  <form id="signupForm">
    <div class="form-group"><input type="text" id="signupUsername" placeholder="Username" required></div>
    <div class="form-group"><input type="email" id="signupEmail" placeholder="Email (Optional)"></div>
    <div class="form-group"><input type="password" id="signupPassword" placeholder="Password" required></div>
    <div class="form-group"><input type="password" id="confirmPassword" placeholder="Confirm Password" required></div>
    <button class="cta" type="submit">Sign Up</button>
  </form>
  <div class="alt-link">Have an account? <a href="login.html">Login</a></div>
</div>

<script src="auth.js"></script>
</body>
</html>
