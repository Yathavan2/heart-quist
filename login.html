<!DOCTYPE html>
<html>
<head>
  <title>Login | Heart Quest</title>
  <link rel="stylesheet" href="auth-styles.css">
</head>
<body>

<div class="heart-floating" style="left:10%;">💞</div>
<div class="heart-floating" style="left:80%; animation-duration:7s;">💗</div>

<div class="form-container">
  <h1>Welcome Back 💖</h1>
  <form id="loginForm">
    <div class="form-group">
      <input type="text" id="loginUsername" placeholder="Username" required>
    </div>
    <div class="form-group">
      <input type="password" id="loginPassword" placeholder="Password" required>
    </div>
    <button class="cta" type="submit">Login</button>
  </form>
  <div class="alt-link">No Account? <a href="signup.html">Sign Up</a></div>
</div>

<script src="auth.js"></script>
</body>
</html>
