<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Heart Quest - Result</title>
  <link rel="stylesheet" href="result.css" />
</head>
<body>
   <div id="heart-background"></div>
  <div class="result-container">
    <div class="result-card">
      <h1>💖 Congratulations 💖</h1>
      <p id="playerName"></p>
      <h2>Your Score: <span id="finalScore">0</span></h2>
      <p class="message">You’ve unlocked the final memory fragment!</p>
      <div class="countdown">
        Redirecting to leaderboard in <span id="countdown">5</span> seconds...
      </div>
      <button onclick="goNow()">Go Now</button>
    </div>
  </div>

  <script src="result.js"></script>
    <script src="script.js"></script>

    <!-- Music Toggle Button -->
<button id="musicToggle">🎵</button>

<script>
const musicToggle = document.getElementById("musicToggle");
const FREESOUND_KEY = "OzQhCFC2QD200txw6zQQfVdRPHN6RS8Bc9iuUNT5";
let bgMusic = new Audio();
bgMusic.loop = true;
bgMusic.volume = 0.45;

// Load a random FreeSound track
async function loadFreeSoundTrack() {
  try {
    const response = await fetch(`https://freesound.org/apiv2/search/text/?query=ambient&fields=previews&token=${FREESOUND_KEY}`);
    const data = await response.json();
    if (data.results && data.results.length > 0) {
      const track = data.results[Math.floor(Math.random() * data.results.length)];
      bgMusic.src = track.previews["preview-hq-mp3"];
    }
  } catch (err) {
    console.error("FreeSound track failed:", err);
    // Fallback static music
    bgMusic.src = "https://cdn.pixabay.com/download/audio/2023/01/26/audio_9c0c8d91f0.mp3?filename=fantasy-ambient-13477.mp3";
  }
}

// Start music if previously on
loadFreeSoundTrack().then(() => {
  if (localStorage.getItem("heartquest_music") === "on") {
    bgMusic.play().catch(()=>{}); // autoplay may require user interaction
    musicToggle.classList.add("active");
  }
});

// Toggle music button
musicToggle.addEventListener("click", () => {
  if (bgMusic.paused) {
    bgMusic.play().catch(()=>{}); 
    localStorage.setItem("heartquest_music", "on");
    musicToggle.classList.add("active");
  } else {
    bgMusic.pause();
    localStorage.setItem("heartquest_music", "off");
    musicToggle.classList.remove("active");
  }
});
</script>

</body>
</html>
